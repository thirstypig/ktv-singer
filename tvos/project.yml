name: KTVSinger
options:
  bundleIdPrefix: com.ktvsinger
  deploymentTarget:
    tvOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.0.0"

targets:
  KTVSinger:
    type: application
    platform: tvOS
    sources:
      - path: KTVSingerApp.swift
      - path: Shared
        excludes:
          - "**/Package.swift"
      - path: Features
    dependencies:
      - package: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ktvsinger.tvos
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: KTV Singer
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
